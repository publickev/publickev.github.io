<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>World Map</title>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson@3"></script>

  <style>
    body { margin: 0; }
    svg { width: 100vw; height: 100vh; background: #cfe8ff; }

    .country {
      stroke: #222;
      stroke-width: 0.5;
    }

    .pin-circle {
      fill: red;
      stroke: black;
      stroke-width: 1;
    }

    .label-box {
      fill: #f5e6a8;
      stroke: #000;
      stroke-width: 1;
      rx: 4;
    }

    .label-text {
      font-size: 12px;
      font-family: sans-serif;
      fill: #000;
      pointer-events: none;
    }
  </style>
</head>
<body>

<svg></svg>

<script>
const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("svg");

// Layers
const mapLayer = svg.append("g");
const markerLayer = svg.append("g");

// Projection
const projection = d3.geoNaturalEarth1()
  .scale(width / 6.5)
  .translate([width / 2, height / 2]);

const path = d3.geoPath(projection);

// Highlight countries
const highlight = new Set([
  "United States of America",
  "Australia",
  "China",
  "Japan",
  "Ecuador",
  "Singapore",
  "Romania",
  "Iceland",
  "South Korea"
]);

// 🌍 Locations (lng, lat)
const markers = [
  { name: "Fukuoka", coords: [130.4017, 33.5902] },
  { name: "Melbourne", coords: [144.9631, -37.8136] },
  { name: "Osaka", coords: [135.5023, 34.6937] },
  { name: "Shanghai", coords: [121.4737, 31.2304] },
  { name: "Tokyo", coords: [139.6503, 35.6762] },
  { name: "Singapore", coords: [103.8198, 1.3521] },
  { name: "Bucharest", coords: [26.1025, 44.4268] },
  { name: "Quito", coords: [-78.4678, -0.1807] },
  { name: "Galápagos Islands", coords: [-90.9656, -0.9538] },
  { name: "Reykjavík", coords: [-21.8174, 64.1265] },
  { name: "Chicago", coords: [-87.6298, 41.8781] },
  { name: "Toronto", coords: [-79.3832, 43.6532] },
  { name: "Hong Kong", coords: [114.1694, 22.3193] },
  { name: "San Francisco", coords: [-122.4194, 37.7749] },
  { name: "Los Angeles", coords: [-118.2437, 34.0522] },
  { name: "Busan", coords: [129.0756, 35.1796] },
  { name: "Seoul", coords: [126.9780, 37.5665] },
  { name: "Beijing", coords: [116.4074, 39.9042] },
  { name: "New York City", coords: [-74.0060, 40.7128] },
  { name: "Great Barrier Reef", coords: [147.6992, -18.2871] }
];

let markerSelection;

// Load map
d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json")
  .then(world => {

    const countries = topojson.feature(world, world.objects.countries).features;

    // Draw countries
    mapLayer.selectAll("path")
      .data(countries)
      .enter()
      .append("path")
      .attr("class", "country")
      .attr("fill", d => {
        const name = d.properties.name;
        return highlight.has(name) ? "#4a90e2" : "#d3d3d3";
      })
      .attr("d", path);

    // Create markers
    markerSelection = markerLayer.selectAll(".marker")
      .data(markers)
      .enter()
      .append("g")
      .attr("class", "marker");

    // Pin
    markerSelection.append("circle")
      .attr("class", "pin-circle")
      .attr("r", 4);

    // Label group
    const label = markerSelection.append("g")
      .attr("transform", "translate(8, -6)");

    const text = label.append("text")
      .attr("class", "label-text")
      .attr("x", 4)
      .attr("y", 12)
      .text(d => d.name);

    // Label box
    label.each(function() {
      const textNode = d3.select(this).select("text").node();
      const bbox = textNode.getBBox();

      d3.select(this)
        .insert("rect", "text")
        .attr("class", "label-box")
        .attr("x", bbox.x - 4)
        .attr("y", bbox.y - 2)
        .attr("width", bbox.width + 8)
        .attr("height", bbox.height + 4);
    });

    // Initial position
    updateMarkers(d3.zoomIdentity);
  });

// Update marker positions
function updateMarkers(transform) {
  markerSelection.attr("transform", d => {
    const [x, y] = projection(d.coords);
    const [tx, ty] = transform.apply([x, y]);
    return `translate(${tx}, ${ty})`;
  });
}

// Zoom behavior
const zoom = d3.zoom()
  .scaleExtent([1, 5])
  .translateExtent([[0, 0], [width, height]])
  .on("zoom", (event) => {
    const transform = event.transform;

    mapLayer.attr("transform", transform);
    updateMarkers(transform);
  });

svg.call(zoom);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="images/bitmoji_square_transparent.png">
  <title>Kevin Zhang</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="header.js"></script>

  <main>
    <div class="year-stat" id="year-stat"></div>
    <div class="life-stat" id="life-stat"></div>

    <p class="section-label">Documents</p>
    <div class="link-grid">
      <a href="docs/resume_publickev.pdf" class="link-card" target="_blank">
        <div>
          <div class="link-card-label">Résumé</div>
          <div class="link-card-desc">Latest version</div>
        </div>
        <span class="link-card-arrow">↗</span>
      </a>
      <a href="library.html" class="link-card">
        <div>
          <div class="link-card-label">Digital Library</div>
          <div class="link-card-desc">Notes & notebooks</div>
        </div>
        <span class="link-card-arrow">→</span>
      </a>
    </div>

    <p class="section-label">Money</p>
    <div class="link-grid">
      <a href="finance.html" class="link-card">
        <div>
          <div class="link-card-label">Finance</div>
          <div class="link-card-desc">Tax brackets, cashback categories</div>
        </div>
        <span class="link-card-arrow">→</span>
      </a>
    </div>

    <p class="section-label">Travel</p>
    <div class="link-grid">
      <a href="japan.html" class="link-card">
        <div>
          <div class="link-card-label">Japan</div>
          <div class="link-card-desc">Transit, food, essentials</div>
        </div>
        <span class="link-card-arrow">→</span>
      </a>
      <a href="iceland.html" class="link-card">
        <div>
          <div class="link-card-label">Iceland</div>
          <div class="link-card-desc">Car rentals, waterfalls</div>
        </div>
        <span class="link-card-arrow">→</span>
      </a>
      <a href="china.html" class="link-card">
        <div>
          <div class="link-card-label">China</div>
          <div class="link-card-desc">Apps & connectivity</div>
        </div>
        <span class="link-card-arrow">→</span>
      </a>
    </div>

    <p class="section-label">Work</p>
    <div class="link-grid">
      <a href="career.html" class="link-card">
        <div>
          <div class="link-card-label">Career</div>
          <div class="link-card-desc">Job boards & resources</div>
        </div>
        <span class="link-card-arrow">→</span>
      </a>
    </div>
  </main>

  <footer class="site-footer">publickev.com</footer>

  <script>
    const today = new Date();
    const startOfYear = new Date(today.getFullYear(), 0, 1);
    const endOfYear = new Date(today.getFullYear(), 11, 31, 23, 59, 59, 999);
    const pct = ((today - startOfYear) / (endOfYear - startOfYear) * 100).toFixed(2);
    document.getElementById('year-stat').textContent = `${today.getFullYear()} is ${pct}% complete.`;

    const birth = new Date(1998, 0, 1);
    const death = new Date(2078, 0, 1);
    const lifeLeft = ((death - today) / (death - birth) * 100).toFixed(1);
    document.getElementById('life-stat').innerHTML =
      `Only <strong>${lifeLeft}%</strong> of life left to live.`;
  </script>
</body>
</html>
